<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker - Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="p-4 text-center fs-1 text-secondary bg-success-subtle mt-2">Budget Tracker</div>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid text-secondary bg-success-subtle mt-2">
                <a class="navbar-brand nav-link disabled" aria-disabled="true" href="#">Pages</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link container-fluid mt-2" href="WebsiteProjectBTracker.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link container-fluid mt-2" href="BTPage2.html">Input Budget</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active container-fluid mt-2" href="#">Contact Us</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>


        <!-- Changed the background colour of the form to match the site-->
        <div class="bg-success-subtle mt-3">
            <form class="m-3">
                <h4 class="text-center">Contact us</h4>
                <!-- Form field for entering first name with a placeholder to help users-->
                <div class="m-3">
                    <label for="firstName" class="form-label contactLabel">First Name</label>
                    <input type="text" class="form-control" id="firstName" placeholder="Enter First Name" required>
                </div>

                <!-- Form field for entering surname with a placeholder to help users-->
                <div class="m-3">
                    <label for="surname" class="form-label contactLabel">Surname</label>
                    <input type="text" class="form-control" id="surname" placeholder="Enter Surname" required>
                </div>

                <!-- Form field for entering description with a placeholder to help users-->
                <div class="m-3">
                    <label for="contactReason" class="form-label contactLabel">Description</label>
                    <textarea type="text" class="form-control" id="contactReason" rows="6"
                        placeholder="Enter Description" required></textarea>
                </div>
                <!-- Using style.css to center the submit button -->
                <div class="contactButton">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
                <br>
            </form>
        </div>



        <!-- Footer for every page for easy linkage to pages and information -->
        <div class="card bg-success-subtle mt-3">
            <div class="card-body text-center">

                <h5 class="card-title">Budget Tracker</h5>

                <!-- Nav links -->
                <a class="text-black text-decoration-none me-2" href="WebsiteProjectBTracker.html">Home</a>
                <a class="text-black text-decoration-none me-2" href="BTPage2.html">Input Expenses</a>
                <a class="text-black text-decoration-none" href="BTPage3.html">Contact Us</a>

                <!-- Horizontal Rule -->
                <hr>

                <!-- Footer text (Developed by and project name) -->
                <p class="card-text mb-1">Developed by Clive (G00484437@atu.ie) & Keith (G00234644@atu.ie)</p>
                <p class="card-text mb-0">Website Project 2026</p>
            </div>
</body>

</html>
