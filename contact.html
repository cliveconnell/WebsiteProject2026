</head>

<body>
    <div class="container">
        <div class="p-4 text-center fs-1 text-secondary bg-success-subtle mt-2">Budget Tracker</div>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid text-secondary bg-success-subtle mt-2">
                <a class="navbar-brand nav-link disabled" aria-disabled="true" href="#">Pages</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link container-fluid mt-2" href="index.html">Home</a>

                        </li>

                    <ul class="navbar-nav">

                </div>
            </div>
        </nav>


        <!-- Changed the background colour of the form to match the site-->
        <div class="bg-success-subtle mt-3">
            <form id="contactForm" class="m-3">
                <h4 class="text-center">Contact us</h4>
                <!-- Form is valid show a success message -->
                <p class="alert-bg-colour d-none py-2 px-3 rounded" id="successMessage"></p>
                <!-- Warning message for invalid field -->
                <p class="alert alert-danger d-none py-2 px-3 rounded" id="firstNameWarning"></p>
                <!-- Form field for entering first name with a placeholder to help users-->
                <div class="m-3">
                    <label for="firstName" class="form-label contactLabel">First Name</label>
                    <input type="text" class="form-control" id="firstName" placeholder="Enter First Name">
                </div>

                <!-- Warning message for invalid field -->
                <p class="alert alert-danger d-none py-2 px-3 rounded" id="surnameWarning"></p>
                <!-- Form field for entering surname with a placeholder to help users-->
                <div class="m-3">
                    <label for="surname" class="form-label contactLabel">Surname</label>
                    <input type="text" class="form-control" id="surname" placeholder="Enter Surname">
                </div>

                <!-- Warning message for invalid field -->
                <p class="alert alert-danger d-none py-2 px-3 rounded" id="emailWarning"></p>
                <!-- Form field for entering email with a placeholder to help users-->
                <div class="m-3">
                    <label for="email" class="form-label contactLabel">Email</label>
                    <!-- Using input text instead of email due to html validation (This way it will show js validation) -->
                    <input type="text" class="form-control" id="email" placeholder="Email@emailaddress.com">
                </div>

                <!-- Warning message for invalid field -->
                <p class="alert alert-danger d-none py-2 px-3 rounded" id="descWarning"></p>
                <!-- Form field for entering description with a placeholder to help users-->
                <div class="m-3">
                    <label for="contactReason" class="form-label contactLabel">Description</label>
                    <textarea class="form-control" id="contactReason" rows="6"
                        placeholder="Enter Description"></textarea>
                </div>
                <!-- Using style.css to center the submit button -->
                <div class="contactButton">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
                <br>
            </form>
        </div>



        <!-- Footer for every page for easy linkage to pages and information -->
        <div class="card bg-success-subtle mt-3">
            <div class="card-body text-center">

                <h5 class="card-title">Budget Tracker</h5>

                <!-- Nav links -->
                <a class="text-black text-decoration-none me-2" href="index.html">Home</a>
                <a class="text-black text-decoration-none me-2" href="budgetOutline.html">Budget Outlined</a>
                <a class="text-black text-decoration-none me-2" href="BTPage2.html">Input Expenses</a>
                <a class="text-black text-decoration-none" href="contact.html">Contact Us</a>

                <!-- Horizontal Rule -->

                <!-- Footer text (Developed by and project name) -->
                <p class="card-text mb-1">Developed by Clive (G00484437@atu.ie) & Keith (G00234644@atu.ie)</p>
                <p class="card-text mb-0">Website Project 2026</p>
            </div>
        </div>

    <!-- Link to external JS file -->
    <script src="js/contactUs.js"></script>
</body>

</html>
