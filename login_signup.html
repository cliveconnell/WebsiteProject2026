        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link href="css/style.css" rel="stylesheet">
    <!-- Favicon for beside the browser title, made with https://favicon.io/favicon-converter/ and image is https://www.flaticon.com/free-icon/budget_10060033-->

</head>

<body>
    <div class="container">
        <div class="p-4 text-center fs-1 text-secondary bg-success-subtle mt-2">Budget Tracker</div>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <!-- navbar-expand-lg expands the navbar on large screens but collapses to a dropdown on medium and small-->
            <div class="container text-secondary bg-success-subtle mt-2">
                <a class="navbar-brand nav-link disabled text-center" aria-disabled="true">Pages</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link mt-2" href="Home.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mt-2" href="budgetOutline.html">Budget Outlined</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mt-2" href="BTPage2.html">Input Budget</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mt-2" href="BTPage3.html">Contact Us</a>
                        </li>
                    </ul>
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link mt-2 active" href="login_signup.html">Login/Sign Up</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div id="carouselExample" class="carousel slide bg-success-subtle mt-3" data-bs-ride="false">
            <!--data-bs-ride = false prevents auto slide-->
            <div class="carousel-inner">
                <div class="carousel-item active"> <!--carousel-item active sets this item as active-->
                    <form class="forms p-3 d-flex flex-column">
                        <div class="m-3">
                            <label for="Username" class="form-label"><b>Username</b></label>
                            <input type="text" placeholder="Username" class="form-control" id="username">
                        </div>
                        <div class="m-3">
                            <label for="email1" class="form-label"><b>Email address</b></label>
                            <input type="email" placeholder="Email@emailaddress.com" class="form-control" id="email1"
                                aria-describedby="emailHelp">
                            <div id="emailHelp" class="form-text">
                                We'll never share your email with anyone else.
                            </div>
                        </div>
                        <div class="m-3">
                            <label for="password1" class="form-label"><b>Password</b></label>
                            <input type="password" placeholder="Password" class="form-control" id="password1">
                        </div>
                        <div class="m-3">
                            <label for="passwordConfirm" class="form-label"><b>Confirm Password</b></label>
                            <input type="password" placeholder="Password" class="form-control" id="passwordConfirm">
                        </div>
                        <div class="mt-auto m-3" id="signupClearButtons">
                            <button type="submit" class="btn btn-primary mb-3" id="submitSignUp">
                                Sign Up
                            </button>
                            <button type="submit" class="btn btn-primary mb-3" id="clearUserData">
                                Clear Data
                            </button>
                        </div>

                    </form>
                </div>
                <div class="carousel-item">
                    <form class="forms p-3 d-flex flex-column">
                        <div class="m-3">
                            <label for="UsernameLogin" class="form-label"><b>Username</b></label>
                            <input type="text" placeholder="Username" class="form-control" id="usernameLogin">
                        </div>
                        <div class="m-3">
                            <label for="passwordLogin" class="form-label"><b>Password</b></label>
                            <input type="password" placeholder="Password" class="form-control" id="passwordLogin">
                        </div>
                        <div class="mt-auto m-3">
                            <button type="button" class="btn btn-primary mb-3" id="submitLogin">
                                Login
                            </button>
                            <button type="button" class="btn btn-primary mb-3" id="submitLogout">
                                Logout
                            </button>
                        </div>

                    </form>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
            <!-- Budget manager for a user who is logged in, with stored credentials - MOVE TO MORE APPROPRIATE LOCATION WHEN COMPLETE-->
        <div class="text-center text-secondary bg-success-subtle mt-3 p-4" id="userBudget">
            <!-- Coded in JS function5() and function4() of Login_Signup.js script-->
        </div>

        <!-- Footer for every page for easy linkage to pages and information -->
        <div class="card bg-success-subtle mt-3">
            <div class="card-body text-center">

                <h5 class="card-title">Budget Tracker</h5>

                <!-- Nav links -->
                <a class="text-black text-decoration-none me-2" href="WebsiteProjectBTracker.html">Home</a>
                <a class="text-black text-decoration-none me-2" href="BTPage2.html">Input Expenses</a>
                <a class="text-black text-decoration-none" href="BTPage3.html">Contact Us</a>

                <!-- Horizontal Rule -->
                <hr>

                <!-- Footer text (Developed by and project name) -->
                <p class="card-text mb-1">Developed by Clive (G00484437@atu.ie) & Keith (G00234644@atu.ie)</p>
                <p class="card-text mb-0">Website Project 2026</p>
            </div>

        </div>

        <!-- External JS file -->
        <script src="js/Login_Signup.js"></script>
</body>

</html>
